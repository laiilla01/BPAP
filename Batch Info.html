<a class="flex items-center gap-stack-md bg-secondary-container text-on-secondary-container border-l-4 border-primary px-6 py-3 transition-all" href="#">

</a>
<a class="flex items-center gap-stack-md text-on-surface-variant hover:bg-surface-container-highest px-6 py-3 transition-all" href="#">

</a>

</a>

<div class="px-gutter mt-auto">
<button class="w-full bg-primary text-on-primary font-label-bold text-label-bold py-3 px-4 rounded hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="add">add</span>
                New Batch Entry
            </button>
</div>
</aside>
<!-- Main Content Area -->
<main class="lg:ml-[260px] min-h-screen w-full flex flex-col">

<!-- Top Bar -->
<header class="h-16 border-b border-outline-variant dark:border-outline bg-surface-container-lowest dark:bg-inverse-surface flex items-center justify-between px-gutter sticky top-0 z-40">
    <div class="w-10 h-10 lg:hidden"></div>
  <div class="flex items-center justify-center flex-1">
    <h2 class="font-display-md text-display-md font-bold text-primary dark:text-primary-fixed-dim">Production Line</h2>
  </div>
  <div class="flex items-center gap-stack-md lg:hidden">
    <button class="material-symbols-outlined text-primary p-2" data-icon="menu">menu</button>
  </div>
  
</header>
<!-- Form Wrapper -->
<div class="flex-1 p-margin-mobile md:p-gutter flex w-full">
<div class="w-full">
<!-- Session / Batch Info Form -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-md md:p-stack-lg w-full min-h-[calc(100vh-theme(spacing.16)-theme(spacing.gutter)*2)]">
<div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-outline-variant pb-stack-md mb-stack-md gap-2">
<h2 class="font-headline-sm text-headline-sm text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="fact_check">fact_check</span>
                            Session/Batch Info
                        </h2>
<span class="text-label-sm font-label-sm text-outline">All fields marked with <span class="text-error">*</span> are required</span>
</div>
<form class="space-y-stack-lg">
<!-- Grid Row 1: Time Context -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-gutter">
<div class="space-y-1">
<label class="text-label-bold font-label-bold text-on-surface-variant">Shift <span class="text-error">*</span></label>
<select class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow">
  <option disabled selected value="">Select Shift</option>
  <option>Day</option>
  <option>Night</option>
  <option>Day-Off</option>
</select>
</div>
<div class="space-y-1">
<label class="text-label-bold font-label-bold text-on-surface-variant">Day <span class="text-error">*</span></label>
<select class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow">
  <option disabled selected value="">Select Day</option>
<option>Sun</option>
<option>Mon</option>
<option>Tue</option>
<option>Wed</option>
<option>Thu</option>
<option>Fri</option>
<option>Sat</option>
</select>
</div>
<div class="space-y-1 sm:col-span-2 lg:col-span-1">
<label class="text-label-bold font-label-bold text-on-surface-variant">Date <span class="text-error">*</span></label>
<div class="relative">
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" type="date">
</div>
</div></div>
<!-- Grid Row 2: Product & Batch Identification -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-1">
<label class="text-label-bold font-label-bold text-on-surface-variant">Product Name <span class="text-error">*</span></label>
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" placeholder="Enter full product name" type="text">
</div>
<div class="space-y-1">
<label class="text-label-bold font-label-bold text-on-surface-variant">Product Code (Auto)</label>
<div class="relative">
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" readonly="" type="text" value="FP001">
<span class="absolute right-3 top-3 material-symbols-outlined text-outline text-sm" data-icon="lock">lock</span>
</div>
</div>
</div>

<!-- Grid Row 3: Environment & Market -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-1">
<label class="text-label-bold font-label-bold text-on-surface-variant">Room No. <span class="text-error">*</span></label>
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" placeholder="e.g.: B1" type="text">
</div>
<div class="space-y-1">
<label class="text-label-bold font-label-bold text-on-surface-variant">Market <span class="text-error">*</span></label>
<select class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow">
<option>Local</option>
<option>Export (Europe)</option>
<option>Export (Middle East)</option>
<option>Export (Africa)</option>
</select>
</div>
</div>
<!-- Optional Section: Personnel -->
<div class="pt-stack-md border-t border-outline-variant">
<h3 class="text-label-bold font-label-bold text-primary mb-4 flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
                                Employee Names (Optional)
                            </h3>
<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-5 gap-stack-sm">
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" placeholder="Employee 1" type="text">
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" placeholder="Employee 2" type="text">
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" placeholder="Employee 3" type="text">
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" placeholder="Employee 4" type="text">
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" placeholder="Employee 5" type="text">
</div>
</div>
<!-- Form Actions -->
<div class="flex flex-col sm:flex-row justify-end gap-stack-md pt-stack-lg">
<button class="w-full sm:w-auto px-gutter py-3 rounded border border-outline text-on-surface-variant hover:bg-surface-container transition-colors font-label-bold text-label-bold" type="button">
                                Cancel
                            </button>
<button class="w-full sm:w-auto px-10 py-3 rounded bg-primary text-on-primary shadow-lg hover:shadow-xl hover:opacity-90 transition-all font-label-bold text-label-bold flex items-center justify-center gap-2" type="submit">
<span class="">Activity Log</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Footer Disclaimer -->

</div>
</div>
</main>
<!-- Visual Enhancements -->
<div class="fixed bottom-0 left-0 w-64 h-64 bg-primary opacity-[0.03] rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed top-0 right-0 w-96 h-96 bg-tertiary opacity-[0.02] rounded-full blur-3xl pointer-events-none"></div>
<script>
        // Simple Interaction logic
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> Saving...';
            setTimeout(() => {
                alert('First page data saved successfully. Moving to next page...');
                btn.innerHTML = originalText;
            }, 1000);
        });

        // Hover scale effect for sidebar items
        const navItems = document.querySelectorAll('aside nav a');
        navItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                if(!item.classList.contains('bg-secondary-container')) {
                    item.style.transform = 'translateX(4px)';
                }
            });
            item.addEventListener('mouseleave', () => {
                item.style.transform = 'translateX(0)';
            });
        });
    </script>




</body></html>
