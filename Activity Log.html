<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #f8f9ff;
            font-family: 'IBM Plex Sans', sans-serif;
        }
        .sidebar-active {
            border-left: 4px solid #006875;
        }
        /* Mobile adjustment for main content */
        @media (max-width: 768px) {
            .sidebar-nav {
                display: none;
            }
            main {
                margin-left: 0 !important;
            }
        }
    </style>

<body class="bg-background text-on-surface">
<!-- SideNavBar -->
<aside class="sidebar-nav fixed left-0 top-0 h-screen w-sidebar-width bg-surface-container-low border-r border-outline-variant flex flex-col py-stack-lg z-50">
<div class="px-gutter mb-stack-lg">
<img alt="Health For Life Logo" class="h-10 object-contain mb-2" src="https://lh3.googleusercontent.com/aida/ADBb0uh702pjKtrgJB1Sgoy5mE_Jb0W-JjqABxypZSFs3QIMdRgpyvJ7dIBRd6sNoLOQLi2pr-CKyISxTraYaiBegzSCmFeAI4spS0vv4MGVDO0yoHT9ycnYgTvqQcgS5M9T83lN-p_5RS6NkezGV3zpYMfUSzemLmIFJhwmfMySju-n3UDJh2GxpGtDedgecmMejkxN4r1Cpt3lXizWUAkkERw13nYPS-p83LJhhjfhkhotaNeYGOjSqAkUnbOe_toS08xxRKqg6u35EQ">
</div>
<nav class="flex-1">
<a class="flex items-center gap-stack-md text-on-surface-variant hover:bg-surface-container-highest px-4 py-3 transition-colors" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-bold text-label-bold">Dashboard</span>
</a>
<a class="flex items-center gap-stack-md text-on-surface-variant hover:bg-surface-container-highest px-4 py-3 transition-colors" href="#">
<span class="material-symbols-outlined">info</span>
<span class="font-label-bold text-label-bold">Session Info</span>
</a>
<a class="flex items-center gap-stack-md bg-secondary-container text-on-secondary-container border-l-4 border-primary px-4 py-3" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-bold text-label-bold">Activity Log</span>
</a>
<a class="flex items-center gap-stack-md text-on-surface-variant hover:bg-surface-container-highest px-4 py-3 transition-colors" href="#">
<span class="material-symbols-outlined">timer_off</span>
<span class="font-label-bold text-label-bold">Delays &amp; Notes</span>
</a>
</nav>
<div class="px-gutter mt-auto">
<button class="w-full bg-primary text-on-primary font-label-bold text-label-bold py-3 rounded-lg flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined">add</span>
                New Batch Entry
            </button>
</div>
</aside>
<!-- Main Content Shell -->
<main class="ml-sidebar-width min-h-screen transition-all duration-300">
<!-- Top Bar -->
<header class="h-16 border-b border-outline-variant dark:border-outline bg-surface-container-lowest dark:bg-inverse-surface flex items-center justify-between px-gutter sticky top-0 z-40">
  
  <!-- مساحة فارغة وهمية على اليسار لموازنة زر القائمة وتحقيق التوسط الدقيق -->
  <div class="w-10 h-10 lg:hidden"></div>

  <!-- العنوان ممركّز في المنتصف -->
  <div class="flex items-center justify-center flex-1">
    <h2 class="font-display-md text-display-md font-bold text-primary dark:text-primary-fixed-dim">Production Line</h2>
  </div>

  <!-- زر القائمة جهة اليمين (يختفي في الشاشات الكبيرة) -->
  <div class="flex items-center gap-stack-md lg:hidden">
    <button class="material-symbols-outlined text-primary p-2" data-icon="menu">menu</button>
  </div>
  
</header>
<!-- Main Form Card -->
<div class="bg-white border border-outline-variant rounded-xl overflow-hidden shadow-sm w-full">
<!-- Part 1: Activities -->
<section class="p-gutter border-b border-outline-variant">
<div class="flex items-center gap-2 mb-stack-md text-primary">
<span class="material-symbols-outlined">pending_actions</span>
<h3 class="font-headline-sm text-headline-sm">Part One: Activity Details</h3>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-gutter">
<!-- Process Code -->
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1">Process Code <span class="text-error">*</span></label>
<select class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow">
<option>Select Process...</option>
<option>Adjustment</option>
<option>Blistering</option>
<option>Cleaning</option>
<option>Line Clearence</option>
<option>Delay</option>
<option>Discharging,Weighing & Finalizing</option>
<option>Sorting</option>
<option>DE-Blister</option>
<option>Break</option>
<option>P.Maintenance</option>
<option>Polisher</option>

</select>
</div>
<!-- Activity -->
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1">Activity </label>
<select class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow">
<option>Select Activity...</option>
<option>F.C</option>
<option>P.C</option>
<option>Disassembly & Reassembly</option>
<option>Tablet</option>
<option>Blister</option>
<option>Waiting for Package</option>
<option>Weighing</option>
<option>Waiting Q.A Department</option>
<option>Stop Packaging</option>
<option>Heater Calibration</option>
<option>Capsules</option>
<option>Calibration</option>
<option>Camera Calibration</option>
</select>
</div>
<!-- Speed-Cat -->
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1">Speed-Cat</label>
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" placeholder="Enter Speed Category" type="text">
</div>
<!-- Feeder -->
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-2">Feeder</label>
<div class="flex gap-6 h-full items-center">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="text-primary focus:ring-primary h-5 w-5 cursor-pointer" name="feeder" type="radio">
<span class="font-body-md group-hover:text-primary transition-colors">Manual</span>
</label>
<label class="flex items-center gap-2 cursor-pointer group">
<input checked="" class="text-primary focus:ring-primary h-5 w-5 cursor-pointer" name="feeder" type="radio">
<span class="font-body-md group-hover:text-primary transition-colors">Automatic</span>
</label>
</div>
</div>
<!-- Start/End Time -->
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1">Start Time</label>
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" type="time">
</div>
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1">End Time</label>
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" type="time">
</div>
</div>
<!-- Automatic Fields -->
<div class="mt-gutter grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-stack-md p-stack-md bg-surface-container-low rounded-xl">
<div class="flex flex-col gap-1">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-label-sm">lock</span>
<label class="font-label-bold text-label-bold text-on-surface-variant">Duration</label>
</div>
<div class="bg-surface-variant/50 p-2 rounded text-data-mono font-data-mono">02:45:00</div>
</div>
<div class="flex flex-col gap-1">
<label class="block font-label-bold text-label-bold text-on-surface-variant">Overlap</label>
<div class="bg-surface-variant/50 p-2 rounded text-data-mono font-data-mono text-error">00:15:00</div>
</div>
<div class="flex flex-col gap-1">
<label class="block font-label-bold text-label-bold text-on-surface-variant">Overtime</label>
<div class="bg-surface-variant/50 p-2 rounded text-data-mono font-data-mono">00:00:00</div>
</div>
<div class="flex flex-col gap-1">
<label class="block font-label-bold text-label-bold text-on-surface-variant">Night Shift</label>
<div class="bg-surface-variant/50 p-2 rounded text-data-mono font-data-mono">00:00:00</div>
</div>
<div class="flex flex-col gap-1">
<label class="block font-label-bold text-label-bold text-on-surface-variant">Achieved (Y/N)</label>
<div class="bg-surface-variant/50 p-2 rounded text-data-mono font-data-mono flex items-center justify-center overflow-hidden">
<select class="bg-transparent border-none p-0 m-0 text-green-800 font-bold text-xs uppercase focus:ring-0 cursor-pointer w-full text-center appearance-none">
<option selected="" value="Y">Yes (Y)</option>
<option value="N">No (N)</option>
</select>
</div>
</div>
</div>
</section>
<!-- Part 2: Quantities -->
<section class="p-gutter">
<div class="flex items-center gap-2 mb-stack-md text-primary">
<span class="material-symbols-outlined">analytics</span>
<h3 class="font-headline-sm text-headline-sm">Part Two: Quantities &amp; Results</h3>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-gutter">
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1">Received Qty (kg)</label>
<div class="relative">
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" step="0.01" type="number" value="500.00">

</div>
</div>
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1">No. of Tablets</label>
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" type="number" value="150000">
</div>
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1">Achieved Qty (kg)</label>
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" step="0.01" type="number" value="485.50">
</div>
<div class="flex flex-col">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1">Quantity Blister <span class="text-label-sm opacity-60 font-normal">(Optional)</span></label>
<input class="w-full border border-outline-variant rounded-lg p-3 bg-surface-bright focus:ring-2 focus:ring-primary font-body-md outline-none transition-shadow" placeholder="--" type="number">
</div>
</div>
<!-- Automatic Calculations -->
<div class="mt-gutter bg-surface-container rounded-xl p-gutter border-l-4 border-tertiary">
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
<div class="flex flex-col justify-center">
<span class="font-label-bold text-label-bold text-on-surface-variant">Avg Tablet Weight (gm)</span>
<div class="flex items-baseline gap-2">
<span class="text-display-md font-bold text-tertiary">0.323</span>
<span class="text-label-sm text-on-surface-variant">gm</span>
</div>
</div>
<div class="flex flex-col justify-center">
<span class="font-label-bold text-label-bold text-on-surface-variant">Waste (kg)</span>
<div class="flex items-baseline gap-2">
<span class="text-display-md font-bold text-error">14.50</span>
<span class="text-label-sm text-on-surface-variant">kg</span>
</div>
</div>
<div class="flex flex-col justify-center">
<div class="flex justify-between items-baseline mb-1">
<span class="font-label-bold text-label-bold text-on-surface-variant">Yield %</span>
<span class="text-display-md font-bold text-primary">97.10%</span>
</div>
<div class="w-full bg-surface-variant h-2.5 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full transition-all duration-500" style="width: 97.1%"></div>
</div>
</div>
</div>
</div>
</section>
<!-- Action Bar -->
<div class="bg-surface-container-low p-gutter flex flex-col sm:flex-row justify-between items-center gap-4 border-t border-outline-variant">
<button class="w-full sm:w-auto px-8 py-3 rounded-lg border border-outline text-on-surface font-label-bold text-label-bold flex items-center justify-center gap-2 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
                        Back
                    </button>
<div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
<button class="w-full sm:w-auto px-8 py-3 rounded-lg border border-primary text-primary font-label-bold text-label-bold hover:bg-primary/5 transition-colors">Cancel</button>
<button class="w-full sm:w-auto px-10 py-3 rounded-lg bg-primary text-on-primary font-label-bold text-label-bold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
                            Delays &amp; Notes<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
</main>
<script>
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('focus', () => {
                const parent = el.closest('.flex-col, .col-span-12');
                if (parent) {
                    parent.classList.add('scale-[1.01]');
                    parent.style.transition = 'transform 0.2s ease';
                }
            });
            el.addEventListener('blur', () => {
                const parent = el.closest('.flex-col, .col-span-12');
                if (parent) {
                    parent.classList.remove('scale-[1.01]');
                }
            });
        });
    </script>




</body></html>
